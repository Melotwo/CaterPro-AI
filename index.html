    <script>
      // Immediate title update based on path for bots
      if (window.location.pathname === '/privacy') {
        document.title = "Privacy Policy | CaterProAi";
      }
      // Frame Buster: Prevent the site from being displayed in a Namecheap "Masked" iframe
      // This helps fix the "Content cannot be displayed" error caused by security headers.
      if (window.top !== window.self) {
        try {
          window.top.location.replace(window.self.location.href);
        } catch (e) {
          console.warn("Frame breakout failed due to cross-origin restrictions. Please ensure 'Masking' is disabled in your domain settings.");
        }
      }

      window.onerror = function(msg, url, line, col, error) {
        // Filter out generic "Script error." which is unhelpful and usually cross-origin related
        if (msg === "Script error.") {
          console.warn("A cross-origin script error occurred. Details are hidden by the browser.");
          return false;
        }
        console.error("Global Error:", msg, "at", url, ":", line, ":", col, error);
        return false;
      };
      window.onunhandledrejection = function(event) {
        console.error("Unhandled Rejection:", event.reason);
      };
    </script>
